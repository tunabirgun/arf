name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # universal: Apple Silicon + Intel
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Arf ${{ github.ref_name }}'
          releaseBody: |
            **Arf 1.3** — organize by dragging.

            **New**
            - **Drag & drop in the sidebar.** Drag a note onto a folder to file it there; drag a folder onto another to **nest** it — its notes and subfolders come along; and drop onto **Vault** to move something back to the top level. A circular move (a folder into its own descendant) is refused, and moving a folder renames every path underneath it in one step.

            Everything is still local-first — plain Markdown on your disk, and every move is written straight to the files.

            **Installing** — these builds are unsigned (no paid certificate yet):
            - **Windows** — SmartScreen may warn: *More info → Run anyway*.
            - **macOS** — right-click the app → *Open* the first time (Gatekeeper).
            - **Linux** — the `.AppImage` is portable: `chmod +x` and run.

            Free and open source. Read the source, not the privacy policy.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
