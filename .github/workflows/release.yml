name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # universal: Apple Silicon + Intel
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Build the release body from the CHANGELOG section for this tag, so the notes always
      # match the version instead of a hardcoded block that goes stale every release.
      - name: Release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo 'body<<CHANGELOG_EOF'
            awk -v hdr="## [$VERSION]" '
              index($0, hdr)==1 {flag=1; next}
              flag && substr($0,1,4)=="## [" {exit}
              flag {print}
            ' CHANGELOG.md
            echo ''
            echo '---'
            echo ''
            echo '**Installing** — these builds are unsigned (no paid certificate yet):'
            echo '- **Windows** — SmartScreen may warn: *More info → Run anyway*.'
            echo '- **macOS** — open the app once, dismiss the warning, then allow it under *System Settings → Privacy & Security → Open Anyway*.'
            echo '- **Linux** — the `.AppImage` is portable: `chmod +x` and run.'
            echo '- **Verify (optional)** — every asset is listed in [`SHA256SUMS.txt`](https://github.com/tunabirgun/arf/releases/download/${{ github.ref_name }}/SHA256SUMS.txt), signed with the [release key](https://github.com/tunabirgun/arf/blob/master/RELEASE_SIGNING_KEY.asc): `gpg --verify SHA256SUMS.txt.asc SHA256SUMS.txt`'
            echo ''
            echo 'Free and open source. Read the source, not the privacy policy.'
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Arf ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Once every platform's assets are on the release, publish a signed manifest of them:
  # SHA256SUMS.txt + a detached GPG signature made with the key in RELEASE_SIGNING_KEY.asc.
  checksums:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download '${{ github.ref_name }}' --repo '${{ github.repository }}' --dir assets
          rm -f assets/SHA256SUMS.txt assets/SHA256SUMS.txt.asc

      - name: Checksum and sign
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          (cd assets && sha256sum *) > SHA256SUMS.txt
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign --output SHA256SUMS.txt.asc SHA256SUMS.txt
          gpg --verify SHA256SUMS.txt.asc SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload '${{ github.ref_name }}' SHA256SUMS.txt SHA256SUMS.txt.asc --clobber --repo '${{ github.repository }}'
