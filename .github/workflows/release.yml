name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # universal: Apple Silicon + Intel
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Arf ${{ github.ref_name }}'
          releaseBody: |
            **Arf 1.2** — a reliability release. A codebase-wide audit turned up correctness, data-safety, and cross-platform bugs across the vault, the on-device machine, and the Library; this ships the verified fixes.

            **Fixed**
            - **Safer saves.** Renaming or moving a note now writes the new file before removing the old one, so an interrupted write — a sync client's lock, a Windows reserved name, a too-long path — can never leave a note on neither path.
            - **A vault always loads.** One unreadable or locked `.md` no longer aborts the whole load; the rest of your notes still open.
            - **Non-Latin titles work.** Titles in Turkish and other scripts keep their letters in the filename instead of collapsing to `untitled`, and Windows device names (CON, NUL, …) are handled.
            - **Truer suggestions.** A note containing the word "constructor" no longer corrupts the on-device similarity math — which had been silently hiding related notes and inventing false pairs. Duplicate titles now resolve the same way on every OS.
            - **Keyboard fixes.** Ctrl/⌘-Backspace no longer deletes the open note while you type in a search box; on macOS, Ctrl is left free for caret shortcuts (⌘ is the app key); editor shortcuts no longer collide with the global ones.
            - **Big vaults stay responsive.** First-run embedding is chunked so it can't exhaust memory, and the full-graph layout is bounded so it won't freeze the window.
            - **Library robustness.** References with no authors no longer crash the list or the BibTeX/RIS/CSL/Nature/Zenodo exporters; arXiv IDs resolve through DataCite; page ranges and empty years export cleanly.
            - Imported `.arf` notes write to the vault immediately; a wiped cache no longer re-injects sample notes; folders with unusual path strings stay visible; and `C#` / `A#m7` are no longer mistaken for tags.

            Local-first as ever — everything still runs on your device.

            **Installing** — these builds are unsigned (no paid certificate yet):
            - **Windows** — SmartScreen may warn: *More info → Run anyway*.
            - **macOS** — right-click the app → *Open* the first time (Gatekeeper).
            - **Linux** — the `.AppImage` is portable: `chmod +x` and run.

            Free and open source. Read the source, not the privacy policy.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
