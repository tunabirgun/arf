name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # universal: Apple Silicon + Intel
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Arf ${{ github.ref_name }}'
          releaseBody: |
            **Arf 1.1** — a second brain that stays a folder of plain text. Your notes are Markdown files on your own disk; an on-device model finds the connections you missed. It takes its name from the Arf invariant, the property of a quadratic form that survives every change of basis — your notes should survive every change of tool.

            **New in 1.1**
            - **Math renders whole.** Display and inline equations no longer drop their delimiters — a CSS class name shared with KaTeX was pushing every closing parenthesis out of the equation.
            - **Connect notes in place.** Linking two notes opens a proper in-app editor — the shared concepts and a suggested sentence — instead of a bare browser prompt.
            - **Link straight from Resonance.** Every suggestion on the right rail now links in one step, the same flow as the weekly Synthesis.
            - **Suggestions that don't repeat.** The sentence Arf proposes when you connect two notes now varies with what they share, rather than reusing one template.
            - **A gallery** in the [documentation](https://tunabirgun.github.io/arf/gallery.html) — a visual tour of the app.

            **Carried over from 1.0**: a live knowledge graph, on-device Resonance and the weekly Synthesis digest, wikilinks that survive renames, LaTeX, `[@citation]` keys, and a command palette — all running entirely on your device.

            **Installing** — these builds are unsigned (no paid certificate yet):
            - **Windows** — SmartScreen may warn: *More info → Run anyway*.
            - **macOS** — right-click the app → *Open* the first time (Gatekeeper).
            - **Linux** — the `.AppImage` is portable: `chmod +x` and run.

            Free and open source. Read the source, not the privacy policy.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
